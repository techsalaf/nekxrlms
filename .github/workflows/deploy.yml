name: Deploy Laravel to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Prepare deploy hook token file
        env:
          DEPLOY_HOOK_TOKEN: ${{ secrets.DEPLOY_HOOK_TOKEN }}
        run: |
          if [ -z "$DEPLOY_HOOK_TOKEN" ]; then
            echo "DEPLOY_HOOK_TOKEN is missing."
            exit 1
          fi

          mkdir -p core/storage/app
          printf "%s" "$DEPLOY_HOOK_TOKEN" > core/storage/app/deploy_hook_token.txt

      - name: 🚀 Deploy via LFTP (Fast & Incremental)
        run: |
          sudo apt-get update && sudo apt-get install -y lftp
          lftp -c "
          set sftp:auto-confirm yes;
          set sftp:connect-program 'ssh -a -x -o StrictHostKeyChecking=no';
          open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} -p ${{ secrets.FTP_PORT }} sftp://${{ secrets.FTP_HOST }};
          mirror -R ./ ${{ secrets.FTP_REMOTE_PATH }} \
            --ignore-time \
            --parallel=10 \
            --verbose \
            --exclude .git/ \
            --exclude .github/ \
            --exclude node_modules/ \
             \
            --exclude core/storage/logs/ \
             \
            --exclude core/tests/ \
            --exclude core/vendor/ \
            --exclude core/storage/framework/ \
            --exclude .env \
            --exclude core/.env;
          quit;
          "

      - name: 🧩 Run migrations + optimize via deploy hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
          DEPLOY_HOOK_TOKEN: ${{ secrets.DEPLOY_HOOK_TOKEN }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ] || [ -z "$DEPLOY_HOOK_TOKEN" ]; then
            echo "Deploy hook secrets are missing. Please set DEPLOY_HOOK_URL and DEPLOY_HOOK_TOKEN."
            exit 1
          fi

          echo "Calling deploy hook..."
          curl -fsS --retry 3 --retry-delay 5 \
            -H "X-DEPLOY-TOKEN: $DEPLOY_HOOK_TOKEN" \
            "$DEPLOY_HOOK_URL"
